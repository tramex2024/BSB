name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Generate Custom App Icons
      run: |
        if [ -f "assets/icon.png" ]; then
          npx @capacitor/assets generate --android --icon
        else
          echo "Icon not found. Skipping icon generation."
        fi

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Automatically Accept Android Licenses
      run: yes | sdkmanager --licenses || true

    - name: Sync Capacitor
      run: node node_modules/@capacitor/cli/bin/capacitor sync android

    - name: Build APK with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean
        ./gradlew assembleDebug --stacktrace

    - name: Create GitHub Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: "BSB App v1.0.${{ github.run_number }}"
        draft: false
        prerelease: false
        files: android/app/build/outputs/apk/debug/app-debug.apk
