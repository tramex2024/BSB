<div class="p-6 space-y-6 animate-fade-in">
    <div class="flex justify-between items-center">
        <h2 class="text-2xl font-bold text-amber-400 flex items-center">
            <i class="fas fa-user-shield mr-3"></i> Admin Control Panel
        </h2>
        <div class="bg-gray-800 px-4 py-2 rounded-lg border border-gray-700">
            <span class="text-xs text-gray-400 uppercase tracking-widest">Server Status:</span>
            <span class="text-emerald-500 font-bold ml-2">ONLINE</span>
        </div>
    </div>

    <div class="bg-gray-800/50 border border-gray-700 rounded-2xl p-6">
        <h3 class="text-lg font-bold mb-4 flex items-center text-blue-400">
            <i class="fas fa-bullhorn mr-2"></i> Push Notifications
        </h3>
        <form id="admin-notify-form" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] text-gray-400 uppercase font-bold mb-1 block">Target Audience</label>
                    <select id="notify-target" class="w-full bg-gray-900 border border-gray-600 rounded-xl p-3 outline-none focus:border-blue-500 text-sm text-white">
                        <option value="all">All Users (Everyone)</option>
                        <option value="advanced">Advanced Only</option>
                        <option value="current">Current (Free) Only</option>
                        <option value="one">Specific User (By Email)</option>
                    </select>
                </div>
                <div id="specific-user-container" style="display: none;">
                    <label class="text-[10px] text-gray-400 uppercase font-bold mb-1 block">Target Email</label>
                    <input type="email" id="notify-email" placeholder="user@example.com" 
                        class="w-full bg-gray-900 border border-gray-600 rounded-xl p-3 outline-none focus:border-blue-500 text-sm text-white">
                </div>
            </div>

            <div>
                <label class="text-[10px] text-gray-400 uppercase font-bold mb-1 block">Message Content</label>
                <textarea id="notify-message" rows="3" placeholder="Example: Server maintenance in 10 minutes..." 
                    class="w-full bg-gray-900 border border-gray-600 rounded-xl p-3 outline-none focus:border-blue-500 text-sm resize-none text-white"></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg flex items-center justify-center">
                <i class="fas fa-paper-plane mr-2"></i> SEND NOTIFICATION
            </button>
        </form>
    </div>

    <div class="bg-gray-800/50 border border-gray-700 rounded-2xl p-6">
        <h3 class="text-lg font-bold mb-4 flex items-center">
            <i class="fas fa-bolt mr-2 text-amber-500"></i> Quick Activation
        </h3>
        <form id="admin-activation-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <input type="email" id="admin-user-email" placeholder="User Email" required
                class="bg-gray-900 border border-gray-600 rounded-xl p-3 outline-none focus:border-amber-500 text-white text-sm">
            <select id="admin-plan-days" class="bg-gray-900 border border-gray-600 rounded-xl p-3 outline-none text-white text-sm">
                <option value="30">30 Days (Standard - $15)</option>
                <option value="90">90 Days (Quarterly - $40)</option>
                <option value="365">365 Days (Annual - $150)</option>
                <option value="7">7 Days (Trial)</option>
            </select>
            <button type="submit" class="bg-amber-600 hover:bg-amber-700 text-white font-bold rounded-xl transition shadow-lg flex items-center justify-center">
                <i class="fas fa-check-circle mr-2"></i> ACTIVATE NOW
            </button>
        </form>
    </div>

    <div class="bg-gray-800/30 border border-gray-700 rounded-2xl overflow-hidden">
        <div class="p-4 bg-gray-800/50 border-b border-gray-700">
            <h3 class="font-bold text-sm uppercase tracking-wider text-gray-300">Recent Payment Activity</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-900/50 text-gray-400 uppercase text-[10px] tracking-widest">
                    <tr>
                        <th class="p-4">User</th>
                        <th class="p-4">Amount</th>
                        <th class="p-4">TXID / Hash</th>
                        <th class="p-4">Status</th>
                    </tr>
                </thead>
                <tbody id="admin-payments-list">
                    <tr>
                        <td colspan="4" class="p-8 text-center text-gray-500 italic">
                            Check your email for TXID verification. Direct integration coming soon.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
