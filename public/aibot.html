<div id="aibot-section" class="flex flex-col h-full animate-fadeIn bg-gray-900 p-2 gap-3 overflow-hidden relative">
    
    <div class="w-full flex justify-between items-center bg-gray-800 p-3 rounded-xl border border-blue-500/30 shadow-lg">
        <div>
            <h2 class="text-lg font-black text-blue-400 tracking-tighter uppercase leading-none">AI Autonomous Engine</h2>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mt-1">
                Modo: <span id="ai-mode-status" class="text-yellow-500 font-mono">Simulación Virtual</span>
            </p>
        </div>
        <div class="flex items-center gap-2 bg-black/40 px-3 py-1.5 rounded-lg border border-blue-500/20">
            <div id="ai-status-dot" class="w-2 h-2 bg-gray-500 rounded-full transition-all duration-500"></div>
            <span class="text-[9px] font-black text-gray-300 tracking-widest uppercase">Neural-V2.6</span>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-3 w-full">       
        
        <div class="bg-gray-800 p-4 rounded-xl border border-blue-500/20 space-y-3 flex flex-col justify-between min-h-[350px]">
            <h3 class="text-gray-400 text-[9px] font-black text-center uppercase tracking-widest border-b border-gray-700 pb-2">Training Control</h3>
            
            <div class="space-y-1">
                <label class="text-[8px] text-blue-400/60 uppercase font-black">Inversión (USDT)</label>
                <input id="ai-amount-usdt" type="number" step="10" placeholder="100.00" class="w-full bg-black/60 border border-blue-500/30 rounded-lg px-3 py-2 text-white font-mono text-xs focus:outline-none focus:border-blue-500">
            </div>

            <div class="space-y-2">
                <button id="btn-start-ai" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-lg font-bold text-[10px] transition-all uppercase tracking-widest shadow-lg">Activar Núcleo IA</button>
                <button id="btn-panic-ai" class="w-full py-2 bg-red-900/20 hover:bg-red-600 text-red-500 hover:text-white rounded-lg font-bold text-[9px] transition-all border border-red-500/30 uppercase flex items-center justify-center gap-2">
    <i class="fas fa-radiation-alt animate-pulse"></i>
    Panic Sell & Stop
</button>
            </div>

            <div class="flex items-center justify-between bg-black/20 p-2 rounded-lg border border-blue-500/10">
                <span class="text-[9px] text-blue-400 uppercase font-black">Ciclo Inteligente</span>
                <input type="checkbox" id="ai-stop-at-cycle" class="w-3 h-3 accent-blue-500">
            </div>

            <div class="bg-black/40 p-2 rounded-lg border border-blue-500/10 flex justify-between items-center">
                <span class="text-[9px] text-gray-500 uppercase font-black">Saldo</span>
                <span id="ai-virtual-balance" class="text-emerald-400 font-mono font-black text-xs">$0.00</span>
            </div>
        </div>

        <div class="bg-gray-800 p-4 rounded-xl border border-blue-500/20 flex flex-col items-center justify-center relative overflow-hidden group min-h-[350px]">
            <h3 class="text-blue-500/60 text-[9px] font-black mb-4 tracking-widest uppercase">Nivel de Confianza</h3>
            <div class="relative w-32 h-32 flex items-center justify-center">
                <svg class="absolute w-full h-full -rotate-90" viewBox="0 0 128 128">
                    <circle cx="64" cy="64" r="58" stroke="#111827" stroke-width="8" fill="transparent" />
                    <circle id="ai-confidence-circle" cx="64" cy="64" r="58" stroke="#3b82f6" stroke-width="8" fill="transparent" class="transition-all duration-1000 ease-out" stroke-dasharray="364.4" stroke-dashoffset="364.4" stroke-linecap="round" />
                </svg>
                <div id="ai-confidence-value" class="text-3xl font-mono font-black text-white">0%</div>
            </div>
            <p id="ai-prediction-text" class="mt-4 text-[9px] font-mono text-center text-blue-300 italic uppercase">>> Calibrando...</p>
        </div>

        <div class="bg-black p-3 rounded-xl border border-blue-500/20 font-mono text-[9px] h-[350px] overflow-hidden flex flex-col shadow-inner">
            <div class="text-blue-500 border-b border-blue-500/20 pb-1 mb-2 shrink-0 font-bold flex justify-between uppercase">
                <span>[Neural_Stream]</span>
                <span class="animate-pulse">_</span>
            </div>
            <div id="ai-log-container" class="space-y-1 overflow-y-auto flex-1 text-gray-400 custom-scrollbar">
                <p class="text-gray-600 italic">>> Estableciendo enlace...</p>
            </div>
        </div>
    </div>

    <div class="bg-gray-800 p-3 rounded-xl border border-gray-700 flex flex-col flex-1 min-h-[250px]">
        <div class="flex items-center justify-between mb-3">
            <h3 class="text-[10px] font-bold text-blue-500 uppercase tracking-widest border-b border-gray-700 pb-1">Neural Transaction Log</h3>
            <div class="flex items-center gap-2 bg-blue-500/10 px-2 py-1 rounded-full border border-blue-500/20">
                <span class="w-1 h-1 bg-emerald-500 rounded-full animate-pulse"></span>
                <span class="text-[8px] text-blue-300 font-black uppercase">Live Feed</span>
            </div>
        </div>
        <div id="ai-order-list" class="overflow-y-auto custom-scrollbar font-mono text-[9px] space-y-2">
            </div>
    </div>
</div>
