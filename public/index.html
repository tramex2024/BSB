<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="/images/bsb-logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSB - Bitmart Spot Bots (Test Mode)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --proton-green: #00e08c; }
        body { background-color: #0b0d10; color: #e5e7eb; }
        .modal { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background-color: #121417; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1rem; width: 100%; max-width: 400px; padding: 1.5rem; }
        .nav-tab.active { border-bottom: 2px solid var(--proton-green); color: #ffffff; }
        .nav-tab { color: #9ca3af; transition: all 0.2s; cursor: pointer; padding: 0.5rem 1rem; }
        .nav-tab:hover { color: #ffffff; }
        .log-bar { background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.05); padding: 0.5rem 1.5rem; font-size: 0.625rem; color: #6b7280; }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col selection:bg-emerald-500/30">

<div id="welcome-splash" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/90 backdrop-blur-md">
    <div class="relative max-w-sm w-full p-4">
        <button id="close-splash" class="absolute -top-2 -right-2 text-white bg-gray-800 rounded-full w-8 h-8 flex items-center justify-center border border-gray-700 hover:bg-gray-700 transition-all z-10">
            &times;
        </button>
        <img src="images/Wellcome.png" alt="Welcome" class="w-full h-auto rounded-2xl shadow-2xl">
    </div>
</div>

<header class="h-16 flex items-center justify-between px-4 md:px-6 bg-[#0b0d10]/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-50 shrink-0">
    <div class="flex items-center space-x-3 shrink-0">
        <img src="images/bsb-logo.png" alt="Logo" class="w-9 h-9">
        <span class="hidden md:block font-bold text-lg md:text-xl tracking-tight">
            Bitmart <span class="text-[#00e08c]">Spot Bots</span>
        </span>
    </div>
    
    <nav id="main-nav" class="flex space-x-1">
        <a class="nav-tab active" data-tab="dashboard">
            <i class="fas fa-chart-line"></i> <span>DASHBOARD</span>
        </a>
        <a class="nav-tab" data-tab="autobot" id="tab-autobot">
            <i class="fas fa-robot"></i> <span>AUTOBOT</span>
        </a>            
        <a class="nav-tab" data-tab="aibot" id="tab-aibot">
            <i class="fas fa-brain"></i> <span>AIBOT</span>
        </a>
        <a class="nav-tab hidden" data-tab="admin" id="tab-admin" style="display: none; color: #fbbf24;">
            <i class="fas fa-user-shield"></i> <span>ADMIN</span>
        </a>
    </nav>
    
    <div class="flex items-center space-x-3 md:space-x-5 text-gray-400">
        <div class="hidden md:flex items-center space-x-2 px-3 py-1 bg-white/5 rounded-full border border-white/10">
            <div id="system-health-dot" class="h-2 w-2 rounded-full bg-red-500 transition-all duration-500"></div>
            <span id="system-health-text" class="text-[10px] uppercase tracking-tighter font-bold">Connecting...</span>
        </div>

        <div class="status-ball-container md:hidden"> 
            <span id="status-dot" class="status-dot-base status-red" title="Connection Status"></span>
        </div>

        <div id="bell-container" class="relative z-50 cursor-pointer hover:text-white transition p-2" title="Notifications">
            <i class="fas fa-bell"></i>
            <span id="notif-dot" class="absolute top-1 right-1 flex h-2 w-2 hidden">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
            </span>
            <div id="notifications-dropdown" class="absolute right-0 mt-2 w-64 bg-[#121417] border border-white/10 rounded-2xl shadow-2xl hidden"></div>
        </div>
        
        <i class="fas fa-gem cursor-pointer hover:text-[#00e08c] transition" id="btn-upgrade" title="Upgrade to Advanced"></i>
        <i class="fas fa-headset cursor-pointer hover:text-blue-400 transition" id="btn-support" title="Technical Support"></i>
        <i class="fas fa-key cursor-pointer hover:text-white transition" id="api-key-icon" title="API Config"></i>
        <i class="fas fa-cog cursor-pointer hover:text-white transition" id="settings-icon" title="General Settings"></i>

        <div class="flex items-center border-l border-white/10 pl-3 md:pl-5 space-x-3">
            <i class="fas fa-user-circle text-xl cursor-pointer hover:text-[#00e08c] transition" id="user-profile-icon" title="Profile"></i>
            <i class="fas fa-sign-in-alt cursor-pointer hover:text-white transition" id="login-logout-icon" title="Login/Logout"></i>
        </div>
    </div>
</header>

<div id="log-bar" class="log-bar shrink-0">
    <p id="log-message">Syncing with Bitmart API...</p>
</div>

<main id="main-content" class="relative flex-1 flex flex-col items-stretch p-4 md:p-6 min-h-[calc(100vh-4rem)] overflow-x-hidden">
    <div class="flex items-center justify-center h-64">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#00e08c]"></div>
    </div>
</main>

<!-- Modals -->
<div id="support-modal" class="modal">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold flex items-center">
                <i class="fas fa-headset mr-3 text-blue-500"></i> BSB Support
            </h2>
            <i class="fas fa-times cursor-pointer hover:text-red-400" id="close-support"></i>
        </div>
        <div id="support-options-container">
            <p class="text-gray-400 text-sm mb-6">Need help with your bots or Bitmart connection? Select an option:</p>
            <div class="grid grid-cols-1 gap-4">
                <button id="whatsapp-support" class="flex items-center justify-between p-4 bg-emerald-900/10 border border-emerald-500/20 rounded-xl hover:bg-emerald-900/30 transition group">
                    <div class="flex items-center">
                        <i class="fab fa-whatsapp text-2xl text-[#00e08c] mr-4"></i>
                        <div class="text-left">
                            <span class="block font-bold text-white">Live WhatsApp</span>
                            <span class="text-xs text-gray-400">Immediate assistance</span>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-gray-600 group-hover:text-[#00e08c] transition"></i>
                </button>
                <button id="open-ticket-form" class="flex items-center justify-between p-4 bg-blue-900/10 border border-blue-500/20 rounded-xl hover:bg-blue-900/30 transition group text-left">
                    <div class="flex items-center">
                        <i class="fas fa-ticket-alt text-2xl text-blue-500 mr-4"></i>
                        <div class="text-left">
                            <span class="block font-bold text-white">Open Support Ticket</span>
                            <span class="text-xs text-gray-400">Response within 24h</span>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right text-gray-600 group-hover:text-blue-500 transition"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="payment-modal" class="modal">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold flex items-center">
                <i class="fas fa-rocket mr-3 text-[#00e08c]"></i> Upgrade
            </h2>
            <i class="fas fa-times cursor-pointer hover:text-red-400" id="close-payment"></i>
        </div>
        <form id="payment-form" class="space-y-4">
            <select id="payment-type" class="w-full bg-[#0b0d10] border border-white/10 rounded-xl p-3 text-sm focus:border-[#00e08c] outline-none">
                <option value="Subscription">Subscription Plan</option>
                <option value="Donation">Donation</option>
            </select>
            <div class="grid grid-cols-2 gap-3">
                <select id="payment-amount" class="w-full bg-[#0b0d10] border border-white/10 rounded-xl p-3 text-sm focus:border-[#00e08c] outline-none">
                    <option value="15">15 USDT (1 Mo)</option>
                    <option value="40">40 USDT (3 Mo)</option>
                    <option value="150">150 USDT (1 Yr)</option>
                </select>
                <div class="w-full bg-gray-800/50 border border-white/10 rounded-xl p-3 text-sm text-[#00e08c] font-bold text-center">TRC-20</div>
            </div>
            <div class="bg-[#00e08c]/10 border border-[#00e08c]/20 rounded-xl p-4 text-center">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=TQ5TgbEXwJLKaS8aMVPnuL1jBjFLXWPd4J" class="mx-auto border-4 border-white rounded-lg mb-4">
                <div class="flex items-center space-x-2">
                    <input type="text" readonly value="TQ5TgbEXwJLKaS8aMVPnuL1jBjFLXWPd4J" id="wallet-address-input" class="flex-1 bg-black/40 border-none text-[10px] p-2 rounded text-gray-300 outline-none font-mono">
                    <button type="button" id="btn-copy-wallet" class="p-2.5 bg-[#00e08c] rounded-lg hover:bg-emerald-700 transition"><i class="fas fa-copy"></i></button>
                </div>
            </div>
            <input type="text" id="tx-hash" required placeholder="Paste TXID..." class="w-full bg-[#0b0d10] border border-white/10 rounded-xl p-3 text-sm">
            <button type="submit" id="btn-submit-payment" class="w-full bg-[#00e08c] hover:bg-[#00c078] text-black font-bold py-3 rounded-xl transition">SUBMIT PAYMENT</button>
        </form>
    </div>
</div>

<div id="api-modal" class="modal">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">BitMart API</h2>
            <i class="fas fa-times cursor-pointer hover:text-red-400" id="close-api-modal"></i>
        </div>
        <form id="api-form" class="space-y-4">
            <input type="text" id="api-key" placeholder="API Key" class="w-full p-3 bg-[#0b0d10] rounded-xl border border-white/10 focus:border-[#00e08c] outline-none text-sm">
            <input type="password" id="secret-key" placeholder="Secret Key" class="w-full p-3 bg-[#0b0d10] rounded-xl border border-white/10 focus:border-[#00e08c] outline-none text-sm">
            <input type="password" id="api-memo" placeholder="API Memo" class="w-full p-3 bg-[#0b0d10] rounded-xl border border-white/10 focus:border-[#00e08c] outline-none text-sm">
            <button type="submit" class="w-full bg-[#00e08c] text-black py-3 rounded-xl font-bold hover:bg-[#00c078] transition">SAVE & VALIDATE</button>
        </form>
    </div>
</div>

<div id="auth-modal" class="modal">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">User Access</h2>
            <i class="fas fa-times cursor-pointer hover:text-red-400" id="close-auth-modal"></i>
        </div>
        <form id="auth-form" class="space-y-4">
            <div id="email-section">
                <input type="email" id="email" placeholder="Email Address" required class="w-full p-3 bg-[#0b0d10] rounded-xl border border-white/10 focus:border-[#00e08c] outline-none">
            </div>
            <div id="token-section" style="display: none;">
                <input type="text" id="token" placeholder="Verification Code" class="w-full p-3 bg-[#0b0d10] rounded-xl border border-white/10 focus:border-[#00e08c] outline-none text-center font-mono">
            </div>
            <button type="submit" id="auth-button" class="w-full bg-[#00e08c] text-black py-3 rounded-xl font-bold hover:bg-[#00c078] transition">CONTINUE</button>
        </form>
    </div>
</div>

<div id="logout-modal" class="modal">
    <div class="modal-content border border-red-900/30">
        <h2 class="text-xl font-bold text-white mb-2">Sign Out?</h2>
        <p class="text-gray-400 text-sm mb-6">You will need a new code to sign back in.</p>
        <div class="flex space-x-3">
            <button id="cancel-logout" class="flex-1 py-3 bg-gray-800 hover:bg-gray-700 rounded-xl font-bold transition">CANCEL</button>
            <button id="confirm-logout" class="flex-1 py-3 bg-red-600 hover:bg-red-700 rounded-xl font-bold transition">LOG OUT</button>
        </div>
    </div>
</div>

<div id="confirm-modal" class="modal">
    <div class="modal-content border-none" id="confirm-modal-content">
        <div class="text-center">
            <div class="w-16 h-16 bg-[#00e08c]/10 border border-[#00e08c]/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-alt text-[#00e08c] text-2xl" id="modal-icon"></i>
            </div>
            <h3 class="text-white font-black text-lg uppercase tracking-tighter mb-2">Confirm Action</h3>
            <div id="modal-message" class="text-gray-400 text-sm mb-6 px-2">Are you sure?</div>
            <div class="flex gap-3">
                <button id="modal-deny" class="flex-1 py-3 bg-white/5 hover:bg-white/10 text-gray-400 font-bold rounded-xl transition">CANCEL</button>
                <button id="modal-accept" class="flex-1 py-3 bg-[#00e08c] hover:bg-[#00c078] text-black font-bold rounded-xl transition">CONFIRM</button>
            </div>
        </div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script type="module" src="/js/main.js"></script>
</body>
</html>
